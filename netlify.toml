[build]
  command = "chmod +x prebuild.sh && ./prebuild.sh && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000" 

# Add specific no-cache headers for PNG files in models directory with stronger settings
[[headers]]
  for = "/models/*.png"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Netlify-CDN-Cache-Control = "no-cache, no-store, must-revalidate"
    Cache-Tag = "png-files" 