<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Abdulla Mohammed Ahmed - Full Stack Developer Portfolio" />
    <meta name="keywords" content="portfolio, full stack developer, web development, react, node.js" />
    <meta name="author" content="Abdulla Mohammed Ahmed" />
    <title>Abdulla Mohammed Ahmed | Portfolio</title>
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/models/Moon.glb" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="/images/astronout.png" as="image">
    
    <!-- DNS prefetch for faster loading -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Prevent FOUC (Flash of Unstyled Content) -->
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register service worker for asset caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
